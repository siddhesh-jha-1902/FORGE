<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FORGE</title>
  <link rel="icon" type="image/svg+xml" href="FORGE.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #060a10;
      --bg2: #0a0f1a;
      --card: #111826;
      --card-h: #161f30;
      --border: #192438;
      --border2: #1e2d47;
      --border3: #243558;
      /* ── Track colours ── */
      --t-java: #06b6d4;
      /* α Java — cyan    */
      --t-cs: #8b5cf6;
      /* β CS   — violet  */
      --t-fe: #10b981;
      /* γ FE   — emerald */
      --t-dsa: #f59e0b;
      /* δ DSA  — gold    */
      /* ── Phase colours — fully distinct from tracks ── */
      --ph1: #f97316;
      /* orange  — ignition     */
      --ph2: #e879f9;
      /* fuchsia — ramp-up      */
      --ph3: #2dd4bf;
      /* teal    — deep build   */
      --ph4: #818cf8;
      /* indigo  — intensive    */
      --ph5: #fb7185;
      /* rose    — final push   */
      --ph6: #a3e635;
      /* lime    — finish line  */
      /* ── Gamma sub-track colours ── */
      --g-html: #f97316;
      --g-css: #ec4899;
      --g-js: #fbbf24;
      --g-ts: #38bdf8;
      --g-react: #a78bfa;
      /* ── Text ── */
      --text: #eef2ff;
      --text2: #7b91b8;
      --text3: #3d5070;
      --text4: #1e2d47;
      --emerald2: #34d399;
      --gold2: #fbbf24;
      --violet2: #a78bfa;
      --cyan2: #22d3ee;
      --rose: #f43f5e;
      --amber: #f97316;
      --sky: #38bdf8;
      --pink: #ec4899;
      --font: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --r: 10px;
      --t: 0.17s ease;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--text4) 1px, transparent 1px),
        linear-gradient(90deg, var(--text4) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: .05;
      pointer-events: none;
      z-index: 0
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 99px
    }

    /* ══ HEADER ═══════════════════════════════════════════════════════ */
    #hdr {
      position: sticky;
      top: 0;
      z-index: 300;
      background: rgba(6, 10, 16, .96);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: relative
    }

    #hdr::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
          transparent 0%, var(--ph1) 12%, var(--t-java) 25%,
          var(--t-cs) 45%, var(--t-fe) 62%,
          var(--t-dsa) 80%, var(--ph6) 95%, transparent 100%);
      opacity: .45;
      pointer-events: none
    }

    .hdr-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 0 8px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap
    }

    .brand {
      flex: 0 0 auto
    }

    .brand-name {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1;
      background: linear-gradient(135deg, var(--t-java), var(--t-cs) 38%, var(--t-fe) 68%, var(--t-dsa));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .brand-tagline {
      font-size: .7rem;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: .3px;
      margin-top: 2px
    }

    .brand-sub {
      font-family: var(--mono);
      font-size: .52rem;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 3px
    }

    .stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      flex: 1
    }

    .s-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      min-width: 56px;
      gap: 1px;
      transition: border-color var(--t), transform var(--t);
      cursor: default
    }

    .s-pill:hover {
      border-color: var(--border2);
      transform: translateY(-1px)
    }

    .s-val {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1
    }

    .sv1 {
      color: var(--t-dsa)
    }

    .sv2 {
      color: var(--t-java)
    }

    .sv3 {
      color: var(--t-fe)
    }

    .sv4 {
      color: var(--t-cs)
    }

    .sv5 {
      color: var(--amber)
    }

    .s-lbl {
      font-size: .52rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .9px;
      color: var(--text3)
    }

    .gbar-wrap {
      width: 100%;
      padding-bottom: 10px;
      padding-top: 4px
    }

    .gbar-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden
    }

    .gbar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--t-java), var(--t-cs) 30%, var(--t-fe) 60%, var(--t-dsa));
      background-size: 300% 100%;
      animation: shimmer 4s linear infinite;
      transition: width .6s cubic-bezier(.4, 0, .2, 1);
      width: 0%
    }

    @keyframes shimmer {
      0% {
        background-position: 300% 0
      }

      100% {
        background-position: -300% 0
      }
    }

    .gbar-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-family: var(--mono);
      font-size: .55rem;
      color: var(--text3)
    }

    /* ══ TOOLBAR ══════════════════════════════════════════════════════ */
    #tbar {
      position: sticky;
      top: 0;
      z-index: 290;
      background: rgba(6, 10, 16, .97);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px
    }

    .tbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 7px 0;
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .tbar-row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap
    }

    .srch-wrap {
      position: relative;
      flex: 0 0 210px
    }

    .srch-ico {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: .8rem;
      pointer-events: none;
      font-family: var(--mono)
    }

    .srch {
      width: 100%;
      padding: 6px 10px 6px 27px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--font);
      font-size: .77rem;
      outline: none;
      transition: border-color var(--t), box-shadow var(--t)
    }

    .srch::placeholder {
      color: var(--text3)
    }

    .srch:focus {
      border-color: rgba(245, 158, 11, .4);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, .08)
    }

    .fg {
      display: flex;
      gap: 2px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 2px
    }

    .fb {
      font-family: var(--font);
      font-size: .66rem;
      font-weight: 700;
      padding: 4px 10px;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--text3);
      cursor: pointer;
      transition: all var(--t);
      white-space: nowrap
    }

    .fb:hover {
      color: var(--text2);
      background: var(--card-h)
    }

    .fb.act {
      background: var(--bg2);
      color: var(--t-dsa);
      border: 1px solid rgba(245, 158, 11, .35)
    }

    /* Track filter buttons */
    .track-filters,
    .phase-filters {
      display: flex;
      gap: 3px;
      flex-wrap: wrap
    }

    .tb {
      font-family: var(--mono);
      font-size: .59rem;
      font-weight: 700;
      padding: 5px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      transition: all var(--t);
      letter-spacing: .4px;
      white-space: nowrap
    }

    .tb.tall {
      color: var(--text2)
    }

    .tb.talpha {
      color: var(--t-java)
    }

    .tb.tbeta {
      color: var(--t-cs)
    }

    .tb.tgamma {
      color: var(--t-fe)
    }

    .tb.tdelta {
      color: var(--t-dsa)
    }

    .tb.tl1 {
      color: #38bdf8
    }

    .tb.tl2 {
      color: #f87171
    }

    .tb.act.tall {
      background: var(--card-h);
      border-color: var(--border3);
      color: var(--text)
    }

    .tb.act.talpha {
      background: rgba(6, 182, 212, .07);
      border-color: rgba(6, 182, 212, .4)
    }

    .tb.act.tbeta {
      background: rgba(139, 92, 246, .07);
      border-color: rgba(139, 92, 246, .4)
    }

    .tb.act.tgamma {
      background: rgba(16, 185, 129, .07);
      border-color: rgba(16, 185, 129, .4)
    }

    .tb.act.tdelta {
      background: rgba(245, 158, 11, .07);
      border-color: rgba(245, 158, 11, .4)
    }

    .tb.act.tl1 {
      background: rgba(56, 189, 248, .07);
      border-color: rgba(56, 189, 248, .4)
    }

    .tb.act.tl2 {
      background: rgba(248, 113, 113, .07);
      border-color: rgba(248, 113, 113, .4)
    }

    /* Phase filter buttons */
    .pb {
      font-family: var(--mono);
      font-size: .57rem;
      font-weight: 700;
      padding: 4px 9px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all var(--t);
      color: var(--text3);
      white-space: nowrap;
      letter-spacing: .3px
    }

    .pb:hover {
      color: var(--text2);
      border-color: var(--border2)
    }

    .pb.act {
      color: var(--text);
      border-color: var(--border3);
      background: var(--card-h)
    }

    .pb.act.pp1 {
      color: var(--ph1);
      border-color: rgba(249, 115, 22, .4)
    }

    .pb.act.pp2 {
      color: var(--ph2);
      border-color: rgba(232, 121, 249, .4)
    }

    .pb.act.pp3 {
      color: var(--ph3);
      border-color: rgba(45, 212, 191, .4)
    }

    .pb.act.pp4 {
      color: var(--ph4);
      border-color: rgba(129, 140, 248, .4)
    }

    .pb.act.pp5 {
      color: var(--ph5);
      border-color: rgba(251, 113, 133, .4)
    }

    .pb.act.pp6 {
      color: var(--ph6);
      border-color: rgba(163, 230, 53, .4)
    }

    .tbar-right {
      margin-left: auto;
      display: flex;
      gap: 5px
    }

    .ab {
      font-family: var(--font);
      font-size: .66rem;
      font-weight: 600;
      padding: 5px 11px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      color: var(--text2);
      cursor: pointer;
      transition: all var(--t)
    }

    .ab:hover {
      background: var(--card-h);
      color: var(--text)
    }

    .ab.today-btn {
      border-color: rgba(245, 158, 11, .3);
      color: var(--t-dsa)
    }

    .ab.today-btn:hover {
      background: rgba(245, 158, 11, .07)
    }

    /* ══ MAIN ═════════════════════════════════════════════════════════ */
    #main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 80px;
      position: relative;
      z-index: 1
    }

    /* ══ PHASE DIVIDERS — each gets its own distinct hue ═════════════ */
    .phase-div {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 30px 0 14px
    }

    .phase-line {
      flex: 1;
      height: 1px;
      opacity: .55
    }

    .phase-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 15px;
      border-radius: 99px;
      font-size: .67rem;
      font-weight: 700;
      letter-spacing: .7px;
      border: 1.5px solid;
      white-space: nowrap;
      position: relative;
      overflow: hidden
    }

    .phase-badge::before {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: .04
    }

    .ph-sub {
      font-weight: 400;
      opacity: .65;
      font-size: .6rem;
      letter-spacing: .2px;
      margin-left: 4px
    }

    .phase-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pdot 2s ease-in-out infinite;
      flex-shrink: 0
    }

    @keyframes pdot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .3;
        transform: scale(.55)
      }
    }

    .ph1 .phase-line {
      background: linear-gradient(90deg, transparent, rgba(249, 115, 22, .7) 30%, rgba(249, 115, 22, .7) 70%, transparent)
    }

    .ph1 .phase-badge {
      color: var(--ph1);
      border-color: rgba(249, 115, 22, .32)
    }

    .ph2 .phase-line {
      background: linear-gradient(90deg, transparent, rgba(232, 121, 249, .7) 30%, rgba(232, 121, 249, .7) 70%, transparent)
    }

    .ph2 .phase-badge {
      color: var(--ph2);
      border-color: rgba(232, 121, 249, .32)
    }

    .ph3 .phase-line {
      background: linear-gradient(90deg, transparent, rgba(45, 212, 191, .7) 30%, rgba(45, 212, 191, .7) 70%, transparent)
    }

    .ph3 .phase-badge {
      color: var(--ph3);
      border-color: rgba(45, 212, 191, .32)
    }

    .ph4 .phase-line {
      background: linear-gradient(90deg, transparent, rgba(129, 140, 248, .7) 30%, rgba(129, 140, 248, .7) 70%, transparent)
    }

    .ph4 .phase-badge {
      color: var(--ph4);
      border-color: rgba(129, 140, 248, .32)
    }

    .ph5 .phase-line {
      background: linear-gradient(90deg, transparent, rgba(251, 113, 133, .7) 30%, rgba(251, 113, 133, .7) 70%, transparent)
    }

    .ph5 .phase-badge {
      color: var(--ph5);
      border-color: rgba(251, 113, 133, .32)
    }

    .ph6 .phase-line {
      background: linear-gradient(90deg, transparent, rgba(163, 230, 53, .7) 30%, rgba(163, 230, 53, .7) 70%, transparent)
    }

    .ph6 .phase-badge {
      color: var(--ph6);
      border-color: rgba(163, 230, 53, .32)
    }

    /* ══ TODAY BANNER ════════════════════════════════════════════════ */
    .today-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(245, 158, 11, .06), rgba(6, 182, 212, .03));
      border: 1px solid rgba(245, 158, 11, .22);
      border-radius: 11px;
      margin-bottom: 16px;
      animation: fadein .5s cubic-bezier(.22, 1, .36, 1)
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(-5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .t-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--t-dsa);
      flex-shrink: 0;
      animation: livep 1.8s ease-in-out infinite
    }

    @keyframes livep {
      0% {
        box-shadow: 0 0 0 0 rgba(245, 158, 11, .55)
      }

      70% {
        box-shadow: 0 0 0 8px rgba(245, 158, 11, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(245, 158, 11, 0)
      }
    }

    .tb-txt {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      line-height: 1.4
    }

    .tb-txt .td {
      color: var(--gold2);
      font-weight: 800
    }

    .tb-prog {
      font-family: var(--mono);
      font-size: .64rem;
      color: var(--text2);
      white-space: nowrap
    }

    .today-pill {
      display: inline-block;
      font-family: var(--mono);
      font-size: .54rem;
      font-weight: 700;
      color: var(--t-dsa);
      background: rgba(245, 158, 11, .1);
      border: 1px solid rgba(245, 158, 11, .3);
      padding: 0 5px;
      border-radius: 3px;
      margin-left: 6px;
      letter-spacing: .5px
    }

    .quote-bar {
      padding: 9px 0 14px;
      font-size: .72rem;
      font-style: italic;
      color: var(--text3);
      text-align: center;
      letter-spacing: .3px
    }

    .quote-bar span {
      color: var(--text2);
      font-weight: 500
    }

    /* ══ DAY CARD ════════════════════════════════════════════════════ */
    .dc {
      margin-bottom: 6px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .45), 0 4px 14px rgba(0, 0, 0, .18);
      transition: border-color var(--t), box-shadow var(--t), transform var(--t)
    }

    .dc:hover {
      border-color: var(--border2);
      transform: translateY(-1px)
    }

    .dc.today {
      border-color: rgba(245, 158, 11, .42);
      transform: none;
      box-shadow: 0 0 0 1px rgba(245, 158, 11, .18), 0 6px 28px rgba(245, 158, 11, .1)
    }

    .dc.today:hover {
      transform: none
    }

    .dc.done-card {
      border-color: rgba(16, 185, 129, .2);
      background: rgba(16, 185, 129, .018)
    }

    .dc.open>.dh {
      border-bottom: 1px solid var(--border)
    }

    .dh {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 15px;
      cursor: pointer;
      user-select: none;
      transition: background var(--t)
    }

    .dh:hover {
      background: rgba(255, 255, 255, .014)
    }

    .dbadge {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      font-family: var(--mono)
    }

    .dbadge-n {
      font-size: .88rem;
      font-weight: 700;
      color: var(--text2);
      line-height: 1
    }

    .dbadge-l {
      font-size: .42rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      margin-top: 2px
    }

    .dc.today .dbadge {
      background: rgba(245, 158, 11, .09);
      border-color: rgba(245, 158, 11, .4)
    }

    .dc.today .dbadge-n {
      color: var(--t-dsa)
    }

    .dc.done-card .dbadge {
      background: rgba(16, 185, 129, .06);
      border-color: rgba(16, 185, 129, .3)
    }

    .dc.done-card .dbadge-n {
      color: var(--t-fe)
    }

    .dtitles {
      flex: 1;
      min-width: 0
    }

    .dtitle {
      font-size: .84rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3
    }

    .ddate {
      font-family: var(--mono);
      font-size: .56rem;
      color: var(--text3);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .dsa-pill {
      font-size: .5rem;
      font-weight: 700;
      color: rgba(245, 158, 11, .7);
      background: rgba(245, 158, 11, .07);
      border: 1px solid rgba(245, 158, 11, .15);
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: .3px;
      white-space: nowrap
    }

    .dsa-pill.lc {
      color: rgba(56, 189, 248, .7);
      background: rgba(56, 189, 248, .07);
      border-color: rgba(56, 189, 248, .15)
    }

    .dtrack-dots {
      display: flex;
      gap: 3px;
      align-items: center;
      flex-shrink: 0
    }

    .dt-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      opacity: .7
    }

    .dt-dot.a {
      background: var(--t-java)
    }

    .dt-dot.b {
      background: var(--t-cs)
    }

    .dt-dot.d {
      background: var(--t-dsa)
    }

    .dt-dot.g {
      background: var(--t-fe)
    }

    .dpw {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0
    }

    .dpt {
      width: 76px;
      height: 4px;
      background: var(--bg2);
      border-radius: 99px;
      overflow: hidden
    }

    .dpf {
      height: 100%;
      background: var(--t-java);
      border-radius: 99px;
      transition: width .45s cubic-bezier(.4, 0, .2, 1);
      width: 0%
    }

    .dc.today .dpf {
      background: linear-gradient(90deg, var(--t-dsa), var(--amber))
    }

    .dc.done-card .dpf {
      background: linear-gradient(90deg, var(--t-fe), var(--emerald2))
    }

    .dpc {
      font-family: var(--mono);
      font-size: .58rem;
      font-weight: 700;
      color: var(--text3);
      min-width: 30px;
      text-align: right
    }

    .dc.today .dpc {
      color: var(--t-dsa)
    }

    .dc.done-card .dpc {
      color: var(--t-fe)
    }

    .done-ico {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(16, 185, 129, .08);
      border: 1.5px solid rgba(16, 185, 129, .38);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .58rem;
      color: var(--t-fe);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity var(--t)
    }

    .dc.done-card .done-ico {
      opacity: 1
    }

    .chev {
      color: var(--text4);
      font-size: .62rem;
      transition: transform var(--t);
      flex-shrink: 0;
      width: 12px;
      text-align: center
    }

    .dc.open .chev {
      transform: rotate(90deg);
      color: var(--text3)
    }

    /* ══ DAY BODY ════════════════════════════════════════════════════ */
    .dbody {
      display: none;
      padding: 0 0 4px
    }

    .dc.open .dbody {
      display: block
    }

    .dtbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 15px 5px;
      border-bottom: 1px solid var(--border)
    }

    .dtbar-info {
      font-size: .63rem;
      color: var(--text3);
      flex: 1
    }

    .dtbar-info strong {
      color: var(--text2);
      font-weight: 600
    }

    .dact {
      font-family: var(--font);
      font-size: .62rem;
      font-weight: 700;
      padding: 3px 9px;
      background: transparent;
      border-radius: 5px;
      cursor: pointer;
      transition: all var(--t);
      display: flex;
      align-items: center;
      gap: 3px
    }

    .dact.mark {
      border: 1px solid rgba(16, 185, 129, .28);
      color: var(--t-fe)
    }

    .dact.mark:hover {
      background: rgba(16, 185, 129, .06);
      border-color: rgba(16, 185, 129, .6)
    }

    .dact.clr {
      border: 1px solid rgba(244, 63, 94, .28);
      color: var(--rose)
    }

    .dact.clr:hover {
      background: rgba(244, 63, 94, .06);
      border-color: rgba(244, 63, 94, .6)
    }

    /* ══ TASK ROW ════════════════════════════════════════════════════ */
    .tl {
      padding: 2px 0
    }

    .tr {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 15px;
      cursor: pointer;
      transition: background var(--t);
      position: relative
    }

    .tr::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: transparent;
      transition: background var(--t);
      border-radius: 0 2px 2px 0
    }

    /* track-specific accent — shows on hover and when done */
    .tr[data-tr="alpha"]:hover::before,
    .tr[data-tr="alpha"].done::before {
      background: rgba(6, 182, 212, .6)
    }

    .tr[data-tr="beta"]:hover::before,
    .tr[data-tr="beta"].done::before {
      background: rgba(139, 92, 246, .6)
    }

    .tr[data-tr="gamma"]:hover::before,
    .tr[data-tr="gamma"].done::before {
      background: rgba(16, 185, 129, .6)
    }

    .tr[data-tr="delta"]:hover::before,
    .tr[data-tr="delta"].done::before {
      background: rgba(245, 158, 11, .6)
    }

    .tr[data-t="prac"]:hover::before,.tr[data-t="prac"].done::before{background:rgba(16,185,129,.6)}
    .tr[data-t="rev"]:hover::before,.tr[data-t="rev"].done::before{background:rgba(251,191,36,.5)}

    .tr:hover {
      background: rgba(255, 255, 255, .016)
    }

    .tcb {
      appearance: none;
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border: 1.5px solid var(--border2);
      border-radius: 5px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      transition: all var(--t);
      position: relative;
      background: var(--bg2)
    }

    .tcb:hover {
      border-color: rgba(6, 182, 212, .5);
      background: rgba(6, 182, 212, .04)
    }

    .tcb:checked {
      background: var(--t-fe);
      border-color: var(--t-fe);
      animation: cb-pop .2s cubic-bezier(.34, 1.56, .64, 1)
    }

    @keyframes cb-pop {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.3)
      }
    }

    .tcb:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 8px;
      border: 1.5px solid #000;
      border-top: none;
      border-left: none;
      transform: rotate(45deg)
    }

    .ttxt {
      flex: 1;
      font-size: .79rem;
      font-weight: 400;
      color: var(--text2);
      line-height: 1.55;
      transition: color var(--t);
      padding-right: 4px
    }

    .tr:hover .ttxt {
      color: var(--text)
    }

    .tr.done .ttxt {
      color: var(--text3);
      text-decoration: line-through;
      text-decoration-color: rgba(255, 255, 255, .1)
    }

    .lico {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border2);
      margin-left: 5px;
      vertical-align: middle;
      font-size: .54rem;
      color: var(--text3);
      flex-shrink: 0;
      transition: all .15s;
      text-decoration: none;
      line-height: 1
    }

    .lico:hover {
      background: rgba(245, 158, 11, .1);
      color: var(--t-dsa);
      border-color: rgba(245, 158, 11, .4)
    }

      flex-shrink: 0;
      font-family: var(--mono);
      font-size: .52rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: .5px;
      margin-top: 2px;
      border: 1px solid;
      white-space: nowrap;
      transition: opacity var(--t), box-shadow var(--t)
    }

    .tr.done .tag {
      opacity: .28
    }

    .tr:hover .tag {
      box-shadow: 0 0 6px currentColor;
      opacity: .95
    }

    /* α Java */
    .tag-alpha {
      background: rgba(6, 182, 212, .07);
      color: #22d3ee;
      border-color: rgba(6, 182, 212, .22)
    }

    /* β CS */
    .tag-beta {
      background: rgba(139, 92, 246, .07);
      color: #a78bfa;
      border-color: rgba(139, 92, 246, .22)
    }

    /* δ DSA L1/L2 */
    .tag-delta {
      background: rgba(245, 158, 11, .07);
      color: #fbbf24;
      border-color: rgba(245, 158, 11, .22)
    }

    .tag-dl2 {
      background: rgba(248, 113, 113, .07);
      color: #fca5a5;
      border-color: rgba(248, 113, 113, .22)
    }

    /* Practice / Revision */
    .tag-prac {
      background: rgba(16, 185, 129, .07);
      color: #34d399;
      border-color: rgba(16, 185, 129, .22)
    }

    .tag-rev {
      background: rgba(245, 158, 11, .05);
      color: #fde68a;
      border-color: rgba(245, 158, 11, .18)
    }

    /* γ Frontend sub-tags */
    .tag-ghtml {
      background: rgba(249, 115, 22, .07);
      color: #fb923c;
      border-color: rgba(249, 115, 22, .22)
    }

    .tag-gcss {
      background: rgba(236, 72, 153, .07);
      color: #f472b6;
      border-color: rgba(236, 72, 153, .22)
    }

    .tag-gjs {
      background: rgba(251, 191, 36, .07);
      color: #fde047;
      border-color: rgba(251, 191, 36, .22)
    }

    .tag-gts {
      background: rgba(56, 189, 248, .07);
      color: #7dd3fc;
      border-color: rgba(56, 189, 248, .22)
    }

    .tag-greact {
      background: rgba(167, 139, 250, .07);
      color: #c4b5fd;
      border-color: rgba(167, 139, 250, .22)
    }

    /* ══ MISC ════════════════════════════════════════════════════════ */
    @keyframes flash-g {

      0%,
      100% {
        background: transparent
      }

      45% {
        background: rgba(16, 185, 129, .05)
      }
    }

    @keyframes flash-r {

      0%,
      100% {
        background: transparent
      }

      45% {
        background: rgba(244, 63, 94, .04)
      }
    }

    .fl-g {
      animation: flash-g .35s ease
    }

    .fl-r {
      animation: flash-r .35s ease
    }

    #toasts {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      box-shadow: 0 4px 24px rgba(0, 0, 0, .5);
      font-size: .73rem;
      font-weight: 600;
      color: var(--text);
      animation: tin .2s ease;
      pointer-events: all;
      min-width: 180px
    }

    .toast.ok {
      border-color: rgba(16, 185, 129, .4)
    }

    .toast.ok .tdot {
      background: var(--t-fe)
    }

    .toast.wn {
      border-color: rgba(245, 158, 11, .4)
    }

    .toast.wn .tdot {
      background: var(--t-dsa)
    }

    .tdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0
    }

    @keyframes tin {
      from {
        opacity: 0;
        transform: translateX(16px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes tout {
      from {
        opacity: 1
      }

      to {
        opacity: 0;
        transform: translateX(16px)
      }
    }

    .hidden {
      display: none !important
    }
  </style>
</head>

      alpha: { cls: 'tag-alpha', lbl: 'JAVA' },
      beta: { cls: 'tag-beta', lbl: 'CS' },
      delta: { cls: 'tag-delta', lbl: 'DSA L1' },
      delta_l2: { cls: 'tag-dl2', lbl: 'DSA L2' },
      prac: { cls: 'tag-prac', lbl: 'PRACTICE' },
      rev: { cls: 'tag-rev', lbl: 'REVISION' },
      gamma_html: { cls: 'tag-ghtml', lbl: 'HTML' },
      gamma_css: { cls: 'tag-gcss', lbl: 'CSS' },
      gamma_js: { cls: 'tag-gjs', lbl: 'JS' },
      gamma_ts: { cls: 'tag-gts', lbl: 'TS' },
      gamma_react: { cls: 'tag-greact', lbl: 'REACT' },
    };

    function trackOf(g) {
      if (g === 'alpha') return 'alpha';
      if (g === 'beta') return 'beta';
      if (g && g.startsWith('gamma')) return 'gamma';
      return 'delta';  // delta/delta_l2/prac/rev
    }

    const PHASE_META = [
      { n: 1, cls: 'ph1', label: 'Phase 1', sub: 'Telusko Core Java · Neso CN · Pepcoding Foundation' },
      { n: 2, cls: 'ph2', label: 'Phase 2', sub: 'Telusko Spring+DevOps · OS Babbar · Pepcoding Intermediate' },
      { n: 3, cls: 'ph3', label: 'Phase 3', sub: 'Lovepreet Java · DBMS · Pepcoding L2 Begins' },
      { n: 4, cls: 'ph4', label: 'Phase 4', sub: 'Projects · LP OS · System Design · Pepcoding L2 Deep' },
      { n: 5, cls: 'ph5', label: 'Phase 5', sub: 'Interview Intensive · Advanced Architecture · LeetCode Grind' },
      { n: 6, cls: 'ph6', label: 'Phase 6', sub: 'Job Ready · Frontend Completion · Mastery' },
    ];

    const QUOTES = [
      "Discipline is doing what needs to be done even when you don't feel like doing it.",
      "First, solve the problem. Then, write the code.",
      "Every line of code you write today is a line someone else won't have to debug tomorrow.",
      "The best time to start was yesterday. The second best time is now.",
      "Programs must be written for people to read, and only incidentally for machines to execute.",
      "It does not matter how slowly you go as long as you do not stop.",
      "A journey of a thousand miles begins with a single commit.",
      "The expert in anything was once a beginner who refused to quit.",
      "Don't watch the clock — do what it does. Keep going.",
      "Code is like humor. When you have to explain it, it's bad.",
      "Real programmers don't comment their code — it was hard to write, it should be hard to understand.",
      "Perfection is achieved not when there is nothing more to add, but when nothing can be taken away.",
      "Build something real. Real users find real bugs.",
      "The best error message is the one that never shows up.",
      "The gap between a junior and senior dev isn't talent — it's the number of bugs they've debugled before you started",
      "Your future self is watching you right now through memories.",
      "Amateurs practice until they get it right. Professionals practice until they can't get it wrong.",
      "A good system is one you can debug at 2am without caffeine.",
      "Every senior engineer is just a junior who stayed uncomfortable long enough.",
      "Stack Overflow & AI answers your question. Understanding answers your next ten.",
      "The roadmap is not the territory. Build anyway.",
      "Nobody who ever gave their best regretted it.",
      "The cost of discipline is always less than the cost of regret.",
      "You don't have to want to do it. You just have to do it.",
      "Hard days are just proof the work is real.",
      "Comfort is the enemy dressed in familiar clothes.",
      "The market doesn't care how tired you are. Neither does the compiler.",
      "Day 1 you and Day 245 you are different people. Become him now.",
      "You're not behind. You're building.",
      "Every system you understand is one less thing that can stop you.",
      "The interview doesn't know you pulled three tracks today. Ship anyway.",
      "One more task. Then one more. That's the whole strategy.",
      "Your future salary is being negotiated right now, by the choices you make today.",
      "Bricklayers don't see the cathedral. They lay bricks.",
      "The best time to be a developer was 10 years ago. The second best time is after 245 days of this.",
      "You are not studying. You are becoming someone companies fight over.",
      "Nobody remembers the days they took off.",
      "Slow is smooth. Smooth is deployed.",
      "Your competition stopped at Day 40. Keep going.",
      "The forge doesn't make iron softer. It makes it stronger.",
    ];

    function build() {
      const s = st();
      const totalAll = DAYS.reduce((a, d) => a + d.tasks.length, 0);
      setText('sTotal', totalAll);

      const main = el('main');
      let html = '';
      let lastPh = 0;

      // Today banner
      if (TODAY >= 0) {
        const day = DAYS[TODAY];
        const dc = day.tasks.filter((_, ti) => s[`${TODAY}-${ti}`]).length;
        html += `<div class="today-banner">
      <div class="t-pulse"></div>
      <div class="tb-txt"><span class="td">Today — Day ${TODAY + 1}</span> &nbsp;·&nbsp; ${fmtDate(dateOf(TODAY))}${day.wk ? ` &nbsp;<span style="color:var(--g-col);font-size:.7rem;font-weight:700;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);padding:1px 6px;border-radius:4px">γ Weekend</span>` : ''}</div>
      <div class="tb-prog" id="tbnp">${dc}/${day.tasks.length} tasks</div>
    </div>`;
      }

      // Quote
      html += `<div class="quote-bar">"<span>${QUOTES[new Date().getDay() % QUOTES.length]}</span>"</div>`;

      DAYS.forEach((day, di) => {
        // Phase divider
        if (day.ph !== lastPh) {
          const pm = PHASE_META[day.ph - 1];
          html += `<div class="phase-div ${pm.cls}" data-ph="${day.ph}">
        <div class="phase-line"></div>
        <div class="phase-badge"><div class="phase-dot"></div>${pm.label} <span class="ph-sub">· ${pm.sub}</span></div>
        <div class="phase-line"></div>
      </div>`;
          lastPh = day.ph;
        }

        const tot = day.tasks.length;
        const done = day.tasks.filter((_, ti) => s[`${di}-${ti}`]).length;
        const pct = tot > 0 ? Math.round(done / tot * 100) : 0;
        const isToday = di === TODAY;
        const isDone = done === tot && tot > 0;

        let cls = 'dc';
        if (isToday) cls += ' today';
        if (isDone) cls += ' done-card';

        // Track dots
        const dots = ['a', 'b', 'd', 'g'].filter(x => (x === 'a' && day.ha) || (x === 'b' && day.hb) || (x === 'd' && day.hd) || (x === 'g' && day.hg));
        const dotsHtml = dots.length ? `<div class="dtrack-dots">${dots.map(x => `<div class="dt-dot ${x}"></div>`).join('')}</div>` : '';

        // DSA pill in date row
        const dsaPill = day.dt && day.dt !== 'LeetCode Practice'
          ? `<span class="dsa-pill">${day.dt}</span>`
          : day.dt === 'LeetCode Practice' ? `<span class="dsa-pill lc">LC</span>` : '';

        // Tasks HTML — ordered: alpha → beta → delta → gamma
        const taskGroups = [
          day.tasks.filter(t => t.g === 'alpha'),
          day.tasks.filter(t => t.g === 'beta'),
          day.tasks.filter(t => ['delta', 'delta_l2', 'prac', 'rev'].includes(t.g)),
          day.tasks.filter(t => t.g && t.g.startsWith('gamma')),
        ];
        const orderedTasks = taskGroups.flat();

        let tasksHtml = '';
        orderedTasks.forEach(task => {
          // find original index for checkbox id
          const ti = day.tasks.indexOf(task);
          const id = `${di}-${ti}`;
          const dn = !!s[id];
          const m = TMETA[task.g] || { cls: 'tag-prac', lbl: '·' };
          const link = task.url ? `<a class="lico" href="${task.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗</a>` : '';
          tasksHtml += `<div class="tr${dn ? ' done' : ''}" id="r-${id}" data-t="${task.g}" data-tr="${trackOf(task.g)}" onclick="el('cb-${id}').click()">
        <input type="checkbox" class="tcb" id="cb-${id}"${dn ? ' checked' : ''}><span class="ttxt">${task.l}${link}</span>
        <span class="tag ${m.cls}">${m.lbl}</span>
      </div>`;
        });

        html += `<div class="${cls}" id="d-${di}" data-ph="${day.ph}" data-wk="${day.wk}">
      <div class="dh" onclick="tog(${di})">
        <div class="dbadge"><span class="dbadge-n">${di + 1}</span><span class="dbadge-l">Day</span></div>
        <div class="dtitles">
          <div class="dtitle">${day.t}</div>
          <div class="ddate">${fmtDate(dateOf(di))}${dsaPill}</div>
        </div>
        ${dotsHtml}
        <div class="dpw"><div class="dpt"><div class="dpf" id="pf-${di}" style="width:${pct}%"></div></div>
        <span class="dpc" id="pc-${di}">${done}/${tot}</span></div>
        <div class="done-ico">✓</div><div class="chev">▶</div>
      </div>
      <div class="dbody" id="b-${di}">
        <div class="dtbar">
          <div class="dtbar-info" id="dti-${di}"><strong>${done}</strong>/${tot}${isToday ? ' <span class="today-pill">TODAY</span>' : ''}</div>
          <button class="dact mark" onclick="markDay(${di},true)">✓ All Done</button>
          <button class="dact clr"  onclick="markDay(${di},false)">↺ Clear</button>
        </div>
        <div class="tl" id="tl-${di}">${tasksHtml}</div>
      </div>
    </div>`;
      });

      main.innerHTML = html;

      // Wire checkboxes
      DAYS.forEach((day, di) => {
        day.tasks.forEach((_, ti) => {
          const cb = el(`cb-${di}-${ti}`);
          if (cb) cb.addEventListener('change', () => onCb(`${di}-${ti}`));
        });
        const body = el(`b-${di}`);
        if (body) body.addEventListener('click', e => e.stopPropagation());
      });

      updAll();
      if (TODAY >= 0) { el(`d-${TODAY}`)?.classList.add('open'); }
    }

    function onCb(id) {
      const cb = el(`cb-${id}`); const row = el(`r-${id}`);
      const s = st(); s[id] = cb.checked; ss(s);
      cb.checked ? row.classList.add('done') : row.classList.remove('done');
      const fc = cb.checked ? 'fl-g' : 'fl-r';
      row.classList.add(fc); setTimeout(() => row.classList.remove(fc), 360);
      updDay(parseInt(id)); updGlobal();
    }

    function parseInt(id) { return window.parseInt(id.split('-')[0]); }

    function markDay(di, val) {
      const s = st(); let chg = false;
      DAYS[di].tasks.forEach((_, ti) => {
        const id = `${di}-${ti}`;
        if (s[id] !== val) { chg = true; } s[id] = val;
        const cb = el(`cb-${id}`); const row = el(`r-${id}`);
        if (cb) cb.checked = val;
        if (row) {
          val ? row.classList.add('done') : row.classList.remove('done');
          const fc = val ? 'fl-g' : 'fl-r'; row.classList.add(fc); setTimeout(() => row.classList.remove(fc), 360);
        }
      });
      if (chg) { ss(s); updDay(di); updGlobal(); toast(val ? `Day ${di + 1} complete ✓` : `Day ${di + 1} cleared`, val ? 'ok' : 'wn'); }
    }

    function updDay(di) {
      const s = st(); const day = DAYS[di];
      const done = day.tasks.filter((_, ti) => s[`${di}-${ti}`]).length;
      const tot = day.tasks.length; const pct = tot > 0 ? Math.round(done / tot * 100) : 0;
      const pf = el(`pf-${di}`); if (pf) pf.style.width = pct + '%';
      setText(`pc-${di}`, `${done}/${tot}`);
      const dti = el(`dti-${di}`);
      if (dti) dti.innerHTML = `<strong>${done}</strong>/${tot}${di === TODAY ? ' <span class="today-pill">TODAY</span>' : ''}`;
      const card = el(`d-${di}`);
      if (card) { done === tot && tot > 0 ? card.classList.add('done-card') : card.classList.remove('done-card'); }
      if (di === TODAY) { const tb = el('tbnp'); if (tb) tb.textContent = `${done}/${tot} tasks`; }
    }

    function updAll() { DAYS.forEach((_, i) => updDay(i)); updGlobal(); }

    function calcStreak() {
      if (TODAY < 0) { setText('sStreak', 0); return; }
      const s = st(); let streak = 0;
      for (let di = TODAY; di >= 0; di--) {
        const day = DAYS[di];
        if (day.tasks.length > 0 && day.tasks.every((_, ti) => !!s[`${di}-${ti}`])) streak++;
        else break;
      }
      setText('sStreak', streak);
    }

    function updGlobal() {
      const s = st(); let done = 0, daysDone = 0;
      const total = DAYS.reduce((a, d) => a + d.tasks.length, 0);
      DAYS.forEach((day, di) => {
        let d = 0; day.tasks.forEach((_, ti) => { if (s[`${di}-${ti}`]) { done++; d++; } });
        if (d === day.tasks.length && day.tasks.length > 0) daysDone++;
      });
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      setText('sDone', done); setText('sDays', daysDone); setText('sPct', pct + '%');
      const gb = el('gbar'); if (gb) gb.style.width = pct + '%';
      setText('glLeft', `${done} of ${total} tasks`);
      setText('glRight', `${pct}%`);
      calcStreak();
    }

    function tog(di) { el(`d-${di}`)?.classList.toggle('open'); }

    function toggleAll() {
      allExp = !allExp;
      document.querySelectorAll('.dc:not(.hidden)').forEach(e => { allExp ? e.classList.add('open') : e.classList.remove('open'); });
      el('expBtn').textContent = allExp ? '⊟ Collapse' : '⊞ Expand';
    }

    function jumpToday() {
      if (TODAY < 0) { toast('Starts 20 May 2026 🔥', 'wn'); return; }
      const e = el(`d-${TODAY}`);
      if (e) { e.classList.add('open'); setTimeout(() => e.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50); }
    }

    function setStatus(v, btn) {
      fStatus = v;
      document.querySelectorAll('.fg .fb').forEach(b => b.classList.remove('act'));
      btn.classList.add('act'); applyFilters();
    }
    function setTrack(v, btn) {
      fTrack = v;
      document.querySelectorAll('.track-filters .tb').forEach(b => b.classList.remove('act'));
      btn.classList.add('act'); applyFilters();
    }
    function setPhase(v, btn) {
      fPhase = v;
      document.querySelectorAll('.phase-filters .pb').forEach(b => b.classList.remove('act'));
      btn.classList.add('act'); applyFilters();
    }

    function applyFilters() {
      const q = el('srch').value.toLowerCase().trim();
      const s = st();
      document.querySelectorAll('.phase-div').forEach(pd => {
        const ph = +pd.dataset.ph;
        pd.classList.toggle('hidden', fPhase > 0 && fPhase !== ph);
      });
      DAYS.forEach((day, di) => {
        const card = el(`d-${di}`); if (!card) return;
        if (fPhase > 0 && day.ph !== fPhase) { card.classList.add('hidden'); return; }
        let any = false;
        day.tasks.forEach((task, ti) => {
          const id = `${di}-${ti}`; const row = el(`r-${id}`); if (!row) return;
          const dn = !!s[id];
          const mq = !q || task.l.toLowerCase().includes(q) || day.t.toLowerCase().includes(q);
          const ms = fStatus === 'all' || (fStatus === 'done' && dn) || (fStatus === 'pending' && !dn);
          let mt = true;
          if (fTrack === 'alpha') mt = task.g === 'alpha';
          else if (fTrack === 'beta') mt = task.g === 'beta';
          else if (fTrack === 'gamma') mt = task.g && task.g.startsWith('gamma');
          else if (fTrack === 'delta') mt = ['delta', 'delta_l2', 'prac', 'rev'].includes(task.g);
          else if (fTrack === 'l1') mt = task.g === 'delta';
          else if (fTrack === 'l2') mt = task.g === 'delta_l2';
          const show = mq && ms && mt;
          row.classList.toggle('hidden', !show);
          if (show) any = true;
        });
        card.classList.toggle('hidden', !any);
      });
    }

    function toast(msg, type = 'ok') {
      const c = el('toasts'); const t = document.createElement('div');
      t.className = `toast ${type}`; t.innerHTML = `<span class="tdot"></span>${msg}`;
      c.appendChild(t);
      setTimeout(() => { t.style.animation = 'tout .2s ease forwards'; setTimeout(() => t.remove(), 220); }, 2800);
    }

    build();

  </script>
</body>

</html>
